name: 每日更新仓库

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TZ: Asia/Shanghai

    steps:
      - name: 检出当前仓库
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 添加上游远程仓库
        run: git remote add upstream https://github.com/jaywcjlove/reference.git

      - name: 拉取上游最新内容
        run: git fetch upstream

      - name: 合并上游到本地子目录（保留本地改动）
        run: |
          git merge --squash -s recursive -Xsubtree=reference -Xours upstream/main || echo "已是最新或无变更"
          git diff --cached --quiet || git commit -m "从上游同步更新 $(date +'%Y-%m-%d %H:%M:%S')"
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com

      - name: 推送合并结果
        run: git push origin HEAD
